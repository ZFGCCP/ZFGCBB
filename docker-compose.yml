services:
  postgresql:
    build:
      context: .
      dockerfile: Dockerfile
      target: database
    container_name: zfgbb_postgresql
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'pg_isready -U ${POSTGRES_USER} -d ${ZFGBB_DATABASE}'"]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s  

  zfgbb:
    build:
      context: .
      dockerfile: Dockerfile
      target: deploy
    ports:
      - "8080:8080"
    volumes:
      - logs:/usr/src/app/logs
    env_file:
      - .env
    depends_on:
      - postgresql

volumes:
  data:
  logs: